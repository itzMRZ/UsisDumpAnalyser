name: Update active semester data

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: semester-sync
  cancel-in-progress: false

jobs:
  sync-active-semester:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync active semester archive
        env:
          CDN_URL: https://usis-cdn.eniamza.com/connect.json
          MID_EXAM_DAY_THRESHOLD: 10
          NEW_SEMESTER_SENTINELS: ENG101:01,MAT110:01,CSE110:01
          TERM_SEQUENCE: spring,fall,summer
        run: node scripts/update-active-semester.mjs

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/config.js data/*.json
          git commit -m "chore: sync active semester data"
          git push